<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ АРТУР: ДИТИНСТВО (0-6)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #ccc;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #d4a574 0%, #a67c52 100%);
            padding: 2rem;
            border-radius: 12px;
            color: #fff;
        }
        .title { font-size: 28px; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { font-size: 14px; opacity: 0.9; }
        .progress-container { margin-bottom: 2rem; }
        .progress-bar {
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-fill { height: 100%; background: #d4a574; transition: width 0.3s; }
        .progress-text { font-size: 12px; color: #888; }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .image-section {
            margin-bottom: 2rem;
            text-align: center;
        }
        .emoji-large {
            font-size: 120px;
            line-height: 1;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .age-display {
            background: #2a2a2a;
            border-left: 4px solid #d4a574;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .age-label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 0.5rem; }
        .age-text { font-size: 20px; font-weight: 700; color: #d4a574; }
        .scene-description {
            background: rgba(212, 165, 116, 0.1);
            border-left: 3px solid #d4a574;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 14px;
            line-height: 1.8;
            color: #aaa;
        }
        .question-box {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 1.5rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .option {
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #ccc;
            line-height: 1.6;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .option:hover {
            border-color: #d4a574;
            background: #222;
            transform: translateX(8px);
        }
        .option.selected {
            border-color: #d4a574;
            background: rgba(212, 165, 116, 0.2);
            color: #d4a574;
            font-weight: 600;
        }
        .option-emoji {
            font-size: 24px;
            flex-shrink: 0;
        }
        .option-text { flex: 1; }
        .button {
            background: #d4a574;
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            padding: 1rem 2rem;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .button:hover:not(:disabled) {
            background: #e8b88a;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
        }
        .button:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat {
            background: #2a2a2a;
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid #d4a574;
            text-align: center;
        }
        .stat-name { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-value { font-size: 20px; font-weight: 700; color: #d4a574; }
        .stat-bar {
            background: #1a1a1a;
            height: 4px;
            border-radius: 2px;
            margin-top: 0.75rem;
            overflow: hidden;
        }
        .stat-bar-fill { height: 100%; background: #d4a574; border-radius: 2px; }
        .hidden { display: none; }
        .ending { text-align: center; padding: 2rem 0; }
        .ending-title { font-size: 32px; font-weight: 700; color: #d4a574; margin-bottom: 1rem; }
        .ending-text { font-size: 16px; line-height: 1.8; color: #aaa; margin-bottom: 2rem; }
        .ending-emoji { font-size: 80px; margin-bottom: 1rem; animation: bounce 1s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="game-screen">
            <div class="header">
                <h1 class="title">⚔️ АРТУР: ДИТИНСТВО</h1>
                <p class="subtitle">0-6 років: де все починається</p>
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 7%;"></div>
                </div>
                <div class="progress-text" id="progress-text">Питання 1/15</div>
            </div>

            <div class="stats" id="stats-container"></div>

            <div class="card">
                <div class="image-section">
                    <div class="emoji-large" id="scene-emoji">👶</div>
                </div>

                <div class="age-display">
                    <div class="age-label">ВІК</div>
                    <div class="age-text" id="age-display">3 років</div>
                </div>

                <div class="scene-description" id="scene-description">
                    Маленький Артур щойно усвідомлює світ...
                </div>

                <div class="question-box">
                    <div class="question-text" id="question-text"></div>
                    <div class="options" id="options-container"></div>
                </div>

                <button class="button" id="next-btn" onclick="nextQuestion()" disabled>ДАЛІ →</button>
            </div>
        </div>

        <div id="ending-screen" class="hidden">
            <div class="header">
                <h1 class="title">⚔️ АРТУР: ДИТИНСТВО</h1>
                <p class="subtitle">Рівень 1 завершено</p>
            </div>

            <div class="card">
                <div class="ending">
                    <div class="ending-emoji">🌱</div>
                    <div class="ending-title">Дитинство сформовано</div>
                    <div class="ending-text">
                        <p id="ending-text"></p>
                        <p style="margin-top: 1.5rem; font-size: 14px;">
                            Твоя основа визначена. Тепер ти готовий до школи...
                        </p>
                    </div>
                    <button class="button" onclick="goToSchool()" style="background: #4caf50;">ШКОЛА → РІВЕНЬ 2</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                age: 3,
                emoji: '👨‍👩‍👦',
                scene: 'Батьківський дім. Перший день усвідомлення...',
                q: 'Як батьки тебе виховували?',
                opts: [
                    { emoji: '⚡', text: 'Строго, але справедливо', stats: { conscientiousness: 7, agreeableness: 2 } },
                    { emoji: '❤️', text: 'М\'яко, з любов\'ю і терпінням', stats: { agreeableness: 8, openness: 4 } },
                    { emoji: '🎪', text: 'Не надто звертали увагу', stats: { extraversion: 6, openness: 6, neuroticism: 3 } }
                ]
            },
            {
                age: 4,
                emoji: '🎨',
                scene: 'Твоя кімнатка. Час забав і мрій...',
                q: 'У дитинстві ти любив...?',
                opts: [
                    { emoji: '🎨', text: 'Малювати і творити', stats: { openness: 8 } },
                    { emoji: '⚽', text: 'Бігати й займатися спортом', stats: { extraversion: 7, conscientiousness: 4 } },
                    { emoji: '📚', text: 'Читати та вивчати нові речі', stats: { conscientiousness: 8 } }
                ]
            },
            {
                age: 5,
                emoji: '😤',
                scene: 'Батьків кабінет. Суворий голос мами...',
                q: 'Коли батьки говорили "НІ", ти...?',
                opts: [
                    { emoji: '🤐', text: 'Слухався без жодних питань', stats: { conscientiousness: 9 } },
                    { emoji: '😔', text: 'Хмурився, але все одно підкорювався', stats: { neuroticism: 5 } },
                    { emoji: '🔥', text: 'Сварився, але потім робив по-своєму', stats: { openness: 7, extraversion: 5 } }
                ]
            },
            {
                age: 4,
                emoji: '🏠',
                scene: 'Виглядаєш у вікно. Батьків немає дома...',
                q: 'Батьків дома часто було...?',
                opts: [
                    { emoji: '🏡', text: 'Завжди - вони присвячували мені час', stats: { agreeableness: 7, neuroticism: -3 } },
                    { emoji: '💼', text: 'Іноді - вони багато працювали', stats: { conscientiousness: 6 } },
                    { emoji: '😞', text: 'Рідко - я часто був один', stats: { openness: 7, neuroticism: 5, agreeableness: -3 } }
                ]
            },
            {
                age: 5,
                emoji: '🌙',
                scene: 'Темна кімнатка. Ночі довгі й чорні...',
                q: 'Чи боявся ти темряви чи самотності?',
                opts: [
                    { emoji: '😨', text: 'Так, це мене лякало', stats: { neuroticism: 7 } },
                    { emoji: '💪', text: 'Ні, я був сміливий', stats: { extraversion: 7 } },
                    { emoji: '🤷', text: 'Іноді, залежало від дня', stats: { neuroticism: 3 } }
                ]
            },
            {
                age: 6,
                emoji: '😢',
                scene: 'Ти щойно впав чи щось не вийшло...',
                q: 'Як батьки реагували на твої невдачі?',
                opts: [
                    { emoji: '🤗', text: 'Підбадьорювали й учили на помилках', stats: { agreeableness: 8 } },
                    { emoji: '😠', text: 'Ругали, потім забували про це', stats: { neuroticism: 6 } },
                    { emoji: '🧪', text: 'Дозволяли мені вчитися самому', stats: { openness: 7 } }
                ]
            },
            {
                age: 5,
                emoji: '😊',
                scene: 'Дитячий парк. Діти навколо грають...',
                q: 'У дитинстві ти був...?',
                opts: [
                    { emoji: '🤐', text: 'Спокійною, замкнутою дитиною', stats: { neuroticism: -5, conscientiousness: 6 } },
                    { emoji: '🎉', text: 'Жвавою й веселою за природою', stats: { extraversion: 9 } },
                    { emoji: '💔', text: 'Чутливою й легко ранимою', stats: { neuroticism: 7 } }
                ]
            },
            {
                age: 6,
                emoji: '🎁',
                scene: 'День народження. Подарунки, кекс і мрії...',
                q: 'Батьки відмовили від чогось дійсно важливого?',
                opts: [
                    { emoji: '💔', text: 'Так, це мене дійсно ранило', stats: { neuroticism: 8 } },
                    { emoji: '😊', text: 'Ні, мені завжди давали потрібне', stats: { agreeableness: 7 } },
                    { emoji: '❓', text: 'Не пам\'ятаю, давно це було', stats: { openness: 4 } }
                ]
            },
            {
                age: 4,
                emoji: '👨‍👧‍👦',
                scene: 'Дитячий сад. Інші діти грають поруч...',
                q: 'Друзів у дитинстві було...?',
                opts: [
                    { emoji: '🌟', text: 'Багато - я був популярний', stats: { extraversion: 9 } },
                    { emoji: '💚', text: 'Один-два близьких друзів', stats: { agreeableness: 8 } },
                    { emoji: '🚫', text: 'Майже не було', stats: { neuroticism: 6 } }
                ]
            },
            {
                age: 5,
                emoji: '🗣️',
                scene: 'Батьки говорять про тебе з родичами...',
                q: 'Батьки казали про тебе...?',
                opts: [
                    { emoji: '🧠', text: 'Ти розумний й спроможний', stats: { conscientiousness: 7 } },
                    { emoji: '😇', text: 'Ти добра й чуйна людина', stats: { agreeableness: 8 } },
                    { emoji: '😔', text: 'Ти складний і важкий', stats: { neuroticism: 7 } }
                ]
            },
            {
                age: 3,
                emoji: '👪',
                scene: 'Сімейна фотографія на стіні...',
                q: 'Твоя родина була...?',
                opts: [
                    { emoji: '💑', text: 'Повна - батько й матір разом', stats: { agreeableness: 6 } },
                    { emoji: '💔', text: 'Розлучена - тільки з одним з батьків', stats: { neuroticism: 5 } },
                    { emoji: '👵', text: 'Інший варіант (опікуни, бабуся)', stats: { conscientiousness: 4 } }
                ]
            },
            {
                age: 5,
                emoji: '💰',
                scene: 'Магазин іграшок. Ти дивишся на полиці...',
                q: 'Матеріальна ситуація в сім\'ї...?',
                opts: [
                    { emoji: '✨', text: 'Добра й забезпечена', stats: { agreeableness: 4 } },
                    { emoji: '🤝', text: 'Середня - вистачало на потреби', stats: { conscientiousness: 5 } },
                    { emoji: '😟', text: 'Важка - батьки переживали', stats: { conscientiousness: 8, neuroticism: 5 } }
                ]
            },
            {
                age: 6,
                emoji: '👊',
                scene: 'Тиша. Батька готує ремінь...',
                q: 'Чи відчував фізичне батьківське насилля?',
                opts: [
                    { emoji: '😰', text: 'Так, мене деколи били', stats: { neuroticism: 9 } },
                    { emoji: '☮️', text: 'Ні, мене ніколи не било', stats: { agreeableness: 7 } },
                    { emoji: '⚠️', text: 'Рідко, але це траплялось', stats: { neuroticism: 5 } }
                ]
            },
            {
                age: 4,
                emoji: '👣',
                scene: 'Батьки дивляться на тебе із задумом...',
                q: 'Батьки цінували тебе як...?',
                opts: [
                    { emoji: '⭐', text: 'Як особистість зі своєю думкою', stats: { openness: 8 } },
                    { emoji: '🏫', text: 'Як дитину, яку потрібно виховати', stats: { conscientiousness: 7 } },
                    { emoji: '⚙️', text: 'Як обов\'язок перед суспільством', stats: { neuroticism: 6 } }
                ]
            },
            {
                age: 6,
                emoji: '🚪',
                scene: 'Ти стоїш перед дверима школи...',
                q: 'На старт до школи ти йшов...?',
                opts: [
                    { emoji: '🎈', text: 'З радістю й нетерпінням', stats: { extraversion: 7 } },
                    { emoji: '😰', text: 'З тривогою, але адаптувався', stats: { neuroticism: 4, conscientiousness: 6 } },
                    { emoji: '😢', text: 'Дуже важко, довго адаптувався', stats: { neuroticism: 7 } }
                ]
            }
        ];

        let gameState = {
            question: 0,
            stats: { openness: 50, conscientiousness: 50, extraversion: 50, agreeableness: 50, neuroticism: 50 },
            selectedOption: null
        };

        function nextQuestion() {
            if (gameState.question >= questions.length) {
                finishLevel();
                return;
            }

            const q = questions[gameState.question];
            document.getElementById('age-display').textContent = `${q.age} років`;
            document.getElementById('scene-emoji').textContent = q.emoji;
            document.getElementById('scene-description').textContent = q.scene;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('progress-text').textContent = `Питання ${gameState.question + 1}/${questions.length}`;
            document.getElementById('progress-fill').style.width = ((gameState.question + 1) / questions.length) * 100 + '%';

            const optDiv = document.getElementById('options-container');
            optDiv.innerHTML = '';

            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerHTML = `<div class="option-emoji">${opt.emoji}</div><div class="option-text">${opt.text}</div>`;
                btn.onclick = () => selectOption(idx, opt, q);
                optDiv.appendChild(btn);
            });

            document.getElementById('next-btn').disabled = true;
            gameState.selectedOption = null;
        }

        function selectOption(idx, opt, q) {
            gameState.selectedOption = idx;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.classList.toggle('selected', i === idx);
            });

            Object.keys(opt.stats).forEach(stat => {
                gameState.stats[stat] = Math.max(0, Math.min(100, gameState.stats[stat] + opt.stats[stat]));
            });

            updateStats();
            document.getElementById('next-btn').disabled = false;
            gameState.question++;
        }

        function updateStats() {
            document.getElementById('stats-container').innerHTML = `
                <div class="stat">
                    <div class="stat-name">Креативність</div>
                    <div class="stat-value">${gameState.stats.openness}</div>
                    <div class="stat-bar"><div class="stat-bar-fill" style="width: ${gameState.stats.openness}%;"></div></div>
                </div>
                <div class="stat">
                    <div class="stat-name">Дисципліна</div>
                    <div class="stat-value">${gameState.stats.conscientiousness}</div>
                    <div class="stat-bar"><div class="stat-bar-fill" style="width: ${gameState.stats.conscientiousness}%;"></div></div>
                </div>
                <div class="stat">
                    <div class="stat-name">Соціальність</div>
                    <div class="stat-value">${gameState.stats.extraversion}</div>
                    <div class="stat-bar"><div class="stat-bar-fill" style="width: ${gameState.stats.extraversion}%;"></div></div>
                </div>
                <div class="stat">
                    <div class="stat-name">Емпатія</div>
                    <div class="stat-value">${gameState.stats.agreeableness}</div>
                    <div class="stat-bar"><div class="stat-bar-fill" style="width: ${gameState.stats.agreeableness}%;"></div></div>
                </div>
            `;
        }

        function finishLevel() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('ending-screen').classList.remove('hidden');

            const dominant = Object.entries(gameState.stats)
                .sort((a, b) => b[1] - a[1])[0][0];

            const descriptions = {
                openness: 'Ти творча й цікава дитина. Світ для тебе повний можливостей.',
                conscientiousness: 'Ти відповідальна й порядна. Дисципліна - твоя природа.',
                extraversion: 'Ти соціальна й енергійна. Люди тебе притягують.',
                agreeableness: 'Ти добра й чуйна. Сочувство - твоя головна рисиця.',
                neuroticism: 'Ти чутлива й емоційна. Почуття керують тобою.'
            };

            document.getElementById('ending-text').textContent = descriptions[dominant] ||
                'Твоє дитинство дало тобі унікальну основу для життя.';
        }

        function goToSchool() {
            alert('🎓 ШКОЛА ЧЕКАЄ!\n\nПоки розробляю рівень 2...\n\nТвої статистики:\n' +
                `Креативність: ${gameState.stats.openness}\n` +
                `Дисципліна: ${gameState.stats.conscientiousness}\n` +
                `Соціальність: ${gameState.stats.extraversion}\n` +
                `Емпатія: ${gameState.stats.agreeableness}`);
        }

        updateStats();
        nextQuestion();
    </script>
</body>
</html>

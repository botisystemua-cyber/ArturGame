<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ ВИХІД З АРМІЇ - Артур</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px 0;
        }
        #root {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <script type="text/babel">
        const ArmyGame = () => {
          const [gameState, setGameState] = React.useState('intro');
          const [selectedSoldiers, setSelectedSoldiers] = React.useState([]);
          const [currentQuestion, setCurrentQuestion] = React.useState(0);
          const [answers, setAnswers] = React.useState({});
          const [psychology, setPsychology] = React.useState(null);
          const [progress, setProgress] = React.useState(() => {
            const saved = localStorage.getItem('armyGameProgress');
            return saved ? JSON.parse(saved) : { level: 1, completed: false };
          });

          React.useEffect(() => {
            localStorage.setItem('armyGameProgress', JSON.stringify(progress));
          }, [progress]);

          const soldiers = [
            {
              id: 1,
              name: 'Сашко',
              age: 19,
              description: 'Спокійний, але потурбований. Побоюється смерті, але слідує наказам.',
              traits: 'introvert, anxious'
            },
            {
              id: 2,
              name: 'Олег',
              age: 21,
              description: 'Енергійний та самовпевнений. Хоче доказати своє і стати героєм.',
              traits: 'extrovert, ambitious'
            },
            {
              id: 3,
              name: 'Миколя',
              age: 22,
              description: 'Спокійний лідер. Непомітний, але люди йому довіряють і слідують за ним.',
              traits: 'leader, calm'
            },
            {
              id: 4,
              name: 'Грицько',
              age: 20,
              description: 'Веселун і гаврок. Полегшує тяжкі моменти, але іноді легкомисленний.',
              traits: 'extrovert, joker'
            }
          ];

          const questions = [
            {
              id: 1,
              question: 'Ти обираєш найсильніших бійців для себе чи найбільш потребуючих допомоги?',
              type: 'leadership',
              answers: [
                { text: 'Найсильніших - команда повинна бути боєздатна', value: 'authoritarian' },
                { text: 'Найбільш потребуючих - хочу їм допомогти', value: 'empath' },
                { text: 'Змішано - баланс між силою і потребами', value: 'balanced' }
              ]
            },
            {
              id: 2,
              question: 'Що тебе більше лякає в армії - смерть чи потеря смислу життя?',
              type: 'existential',
              answers: [
                { text: 'Смерть - це найстрашніше', value: 'fear_death' },
                { text: 'Потеря смислу - це гірше', value: 'existential_crisis' },
                { text: 'Обидва однаково страшні', value: 'both_afraid' }
              ]
            },
            {
              id: 3,
              question: 'Коли ти в кімнатці один, що ти робиш? (за час відпочинку)',
              type: 'personality',
              answers: [
                { text: 'Читаю, роздумую про сенс', value: 'introvert_thinker' },
                { text: 'Граю з товаришами, веселюся', value: 'extrovert_social' },
                { text: 'Писав би фото, знімав би відео', value: 'creative' }
              ]
            },
            {
              id: 4,
              question: 'Що ти бачиш своєю роботою в армії - службу або краї суспільства?',
              type: 'purpose',
              answers: [
                { text: 'Це моя служба і обов\'язок перед Батьківщиною', value: 'duty' },
                { text: 'Це крає суспільства, мені скучно', value: 'meaningless' },
                { text: 'Це можливість навчатись і розвиватись', value: 'growth' }
              ]
            }
          ];

          const handleSoldierSelect = (soldierName) => {
            if (selectedSoldiers.includes(soldierName)) {
              setSelectedSoldiers(selectedSoldiers.filter(s => s !== soldierName));
            } else if (selectedSoldiers.length < 3) {
              setSelectedSoldiers([...selectedSoldiers, soldierName]);
            }
          };

          const handleStartQuestions = () => {
            if (selectedSoldiers.length >= 2) {
              setGameState('questions');
              setCurrentQuestion(0);
            }
          };

          const handleAnswerQuestion = (answerValue) => {
            const newAnswers = { ...answers, [currentQuestion]: answerValue };
            setAnswers(newAnswers);

            if (currentQuestion < questions.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
            } else {
              analyzePlayer(newAnswers);
              setGameState('analysis');
            }
          };

          const analyzePlayer = (playerAnswers) => {
            let psychoProfile = {
              traits: [],
              recommendation: '',
              canLeave: false,
              motivation: '',
              depth: 0
            };

            const values = Object.values(playerAnswers);
            
            if (playerAnswers[0] === 'empath') {
              psychoProfile.traits.push('Емпат');
              psychoProfile.depth += 2;
            } else if (playerAnswers[0] === 'balanced') {
              psychoProfile.traits.push('Збалансований лідер');
              psychoProfile.depth += 1;
            } else {
              psychoProfile.traits.push('Авторитарний');
            }

            if (playerAnswers[1] === 'existential_crisis') {
              psychoProfile.traits.push('Шукає сенс');
              psychoProfile.depth += 3;
              psychoProfile.canLeave = true;
            } else if (playerAnswers[1] === 'both_afraid') {
              psychoProfile.traits.push('Амбівалентний');
              psychoProfile.depth += 1;
            }

            if (playerAnswers[2] === 'creative') {
              psychoProfile.traits.push('Творець');
              psychoProfile.depth += 2;
              psychoProfile.motivation = 'Хочеш вирватись в творчість (фото/відео)';
            } else if (playerAnswers[2] === 'introvert_thinker') {
              psychoProfile.traits.push('Философ');
              psychoProfile.depth += 2;
            }

            if (playerAnswers[3] === 'meaningless') {
              psychoProfile.traits.push('Скептик щодо армії');
              psychoProfile.canLeave = true;
              psychoProfile.depth += 2;
            } else if (playerAnswers[3] === 'growth') {
              psychoProfile.traits.push('Прагне розвитку');
              psychoProfile.depth += 1;
            }

            if (psychoProfile.depth >= 6) {
              psychoProfile.recommendation = 'Артур, у тебе глибока натура. 12 років ти боротимешся з тим, що сьогодні вже усвідомлюєш: армія - це не твій шлях. Але ти воєш честі свої обіцянки.';
              psychoProfile.canLeave = true;
            } else if (psychoProfile.depth >= 4) {
              psychoProfile.recommendation = 'Ти здатний служити, але щось у середині гніте. Це нормально. Потрібен час, щоб зрозуміти, який шлях твій.';
            } else {
              psychoProfile.recommendation = 'Ти природжений воєнний або успішно себе переконав у цьому. Але запитай себе - це твій вибір чи примус?';
            }

            setPsychology(psychoProfile);
          };

          const styles = {
            container: {
              maxWidth: '600px',
              margin: '0 auto',
              padding: '2rem 1rem',
              fontFamily: 'system-ui, -apple-system, sans-serif'
            },
            header: {
              textAlign: 'center',
              marginBottom: '2rem'
            },
            title: {
              fontSize: '28px',
              fontWeight: '700',
              marginBottom: '0.5rem',
              color: '#f0f0f0'
            },
            subtitle: {
              fontSize: '14px',
              color: '#999',
              marginTop: '0.5rem'
            },
            card: {
              background: '#2a2a2a',
              borderRadius: '12px',
              padding: '2rem',
              marginBottom: '1.5rem',
              border: '1px solid #444',
              color: '#f0f0f0'
            },
            year: {
              fontSize: '12px',
              color: '#888',
              textTransform: 'uppercase',
              letterSpacing: '1px',
              marginBottom: '0.5rem'
            },
            location: {
              fontSize: '18px',
              fontWeight: '700',
              color: '#d4a574',
              marginBottom: '1.5rem'
            },
            narrative: {
              fontSize: '14px',
              lineHeight: '1.8',
              color: '#ccc',
              marginBottom: '2rem'
            },
            soldiersGrid: {
              display: 'grid',
              gridTemplateColumns: '1fr 1fr',
              gap: '1rem',
              marginBottom: '1.5rem'
            },
            soldierCard: {
              background: '#2a2a2a',
              border: '2px solid #444',
              borderRadius: '8px',
              padding: '1rem',
              cursor: 'pointer',
              transition: 'all 0.3s',
              position: 'relative',
              color: '#f0f0f0'
            },
            soldierCardSelected: {
              borderColor: '#d4a574',
              backgroundColor: '#1a1a1a',
              boxShadow: '0 0 10px rgba(212, 165, 116, 0.3)'
            },
            soldierName: {
              fontSize: '16px',
              fontWeight: '700',
              color: '#f0f0f0',
              marginBottom: '0.25rem'
            },
            soldierAge: {
              fontSize: '12px',
              color: '#888',
              marginBottom: '0.5rem'
            },
            soldierDesc: {
              fontSize: '13px',
              lineHeight: '1.5',
              color: '#aaa'
            },
            checkmark: {
              position: 'absolute',
              top: '10px',
              right: '10px',
              fontSize: '24px',
              color: '#d4a574'
            },
            selectedInfo: {
              fontSize: '14px',
              color: '#888',
              marginBottom: '1rem',
              textAlign: 'center'
            },
            selectedList: {
              marginTop: '0.5rem',
              display: 'flex',
              gap: '0.5rem',
              justifyContent: 'center',
              flexWrap: 'wrap'
            },
            selectedTag: {
              background: '#d4a574',
              color: '#1a1a1a',
              padding: '0.25rem 0.75rem',
              borderRadius: '16px',
              fontSize: '12px',
              fontWeight: '600'
            },
            questionText: {
              fontSize: '16px',
              fontWeight: '600',
              color: '#f0f0f0',
              marginBottom: '1.5rem',
              lineHeight: '1.6'
            },
            answersContainer: {
              display: 'flex',
              flexDirection: 'column',
              gap: '1rem'
            },
            answerButton: {
              background: '#333',
              border: '1px solid #555',
              borderRadius: '8px',
              padding: '1rem',
              fontSize: '14px',
              cursor: 'pointer',
              transition: 'all 0.3s',
              textAlign: 'left',
              lineHeight: '1.5',
              color: '#ccc'
            },
            traitsBox: {
              background: '#1a1a1a',
              border: '1px solid #d4a574',
              borderRadius: '8px',
              padding: '1rem',
              marginBottom: '1.5rem'
            },
            traitsTitle: {
              fontSize: '12px',
              color: '#d4a574',
              textTransform: 'uppercase',
              marginBottom: '0.75rem',
              fontWeight: '700'
            },
            traitTag: {
              display: 'inline-block',
              background: '#d4a574',
              color: '#1a1a1a',
              padding: '0.5rem 1rem',
              borderRadius: '4px',
              fontSize: '13px',
              marginRight: '0.5rem',
              marginBottom: '0.5rem',
              fontWeight: '600'
            },
            recommendationBox: {
              background: '#1a1a1a',
              border: '1px solid #555',
              borderRadius: '8px',
              padding: '1.5rem',
              marginBottom: '1.5rem'
            },
            recommendationTitle: {
              fontSize: '14px',
              fontWeight: '700',
              color: '#f0f0f0',
              marginBottom: '0.75rem'
            },
            recommendationText: {
              fontSize: '14px',
              lineHeight: '1.8',
              color: '#aaa',
              margin: 0
            },
            motivationBox: {
              background: 'rgba(0, 102, 204, 0.1)',
              border: '1px solid #0066cc',
              borderRadius: '8px',
              padding: '1.5rem',
              marginBottom: '1.5rem'
            },
            motivationTitle: {
              fontSize: '14px',
              fontWeight: '700',
              color: '#88ccff',
              marginBottom: '0.75rem'
            },
            motivationText: {
              fontSize: '14px',
              lineHeight: '1.8',
              color: '#88ccff',
              margin: 0
            },
            canLeavebox: {
              padding: '1rem',
              textAlign: 'center',
              marginBottom: '1.5rem'
            },
            buttonPrimary: {
              background: '#d4a574',
              color: '#1a1a1a',
              border: 'none',
              borderRadius: '8px',
              padding: '1rem 2rem',
              fontSize: '14px',
              fontWeight: '700',
              cursor: 'pointer',
              transition: 'all 0.3s',
              width: '100%'
            },
            buttonDisabled: {
              opacity: '0.5',
              cursor: 'not-allowed'
            },
            progressBar: {
              height: '4px',
              background: '#444',
              borderRadius: '2px',
              overflow: 'hidden',
              marginTop: '2rem'
            },
            progressFill: {
              height: '100%',
              background: '#d4a574',
              transition: 'width 0.3s'
            },
            levelText: {
              textAlign: 'center',
              fontSize: '12px',
              color: '#888',
              marginTop: '0.75rem',
              textTransform: 'uppercase',
              letterSpacing: '1px'
            }
          };

          if (gameState === 'intro') {
            return (
              <div style={styles.container}>
                <div style={styles.header}>
                  <h1 style={styles.title}>⚔️ ВИХІД З АРМІЇ</h1>
                  <p style={styles.subtitle}>Артур - твоя історія починається весною 2005</p>
                </div>

                <div style={styles.card}>
                  <div style={styles.year}>2005 рік, весна</div>
                  <div style={styles.location}>95 БРИГАДА, КОСУХА</div>
                  
                  <div style={styles.narrative}>
                    <p>Прапорщик Артур прибув до нової бригади. Новий призив. Нові люди.</p>
                    <p>Перед ним стоїть вибір: кого обрати собі у команду? Хто йому поможе?</p>
                    <p>Давай почнемо звідти...</p>
                  </div>

                  <button 
                    onClick={() => setGameState('chooseSoldiers')}
                    style={styles.buttonPrimary}
                  >
                    РОЗПОЧАТИ → ВИБІР БІЙЦІВ
                  </button>
                </div>

                <div style={styles.progressBar}>
                  <div style={{...styles.progressFill, width: '33%'}}></div>
                </div>
                <div style={styles.levelText}>РІВЕНЬ 1/3 - 2005</div>
              </div>
            );
          }

          if (gameState === 'chooseSoldiers') {
            return (
              <div style={styles.container}>
                <div style={styles.header}>
                  <h1 style={styles.title}>ВИБІР КОМАНДИ</h1>
                  <p style={styles.subtitle}>Обери собі 2-3 бійців для своєї команди</p>
                </div>

                <div style={styles.card}>
                  <div style={styles.soldiersGrid}>
                    {soldiers.map(soldier => (
                      <div
                        key={soldier.id}
                        onClick={() => handleSoldierSelect(soldier.name)}
                        style={{
                          ...styles.soldierCard,
                          ...(selectedSoldiers.includes(soldier.name) ? styles.soldierCardSelected : {})
                        }}
                      >
                        <div style={styles.soldierName}>{soldier.name}</div>
                        <div style={styles.soldierAge}>{soldier.age} років</div>
                        <div style={styles.soldierDesc}>{soldier.description}</div>
                        {selectedSoldiers.includes(soldier.name) && (
                          <div style={styles.checkmark}>✓</div>
                        )}
                      </div>
                    ))}
                  </div>

                  <div style={styles.selectedInfo}>
                    Обрано: {selectedSoldiers.length}/3
                    {selectedSoldiers.length > 0 && (
                      <div style={styles.selectedList}>
                        {selectedSoldiers.map(name => (
                          <span key={name} style={styles.selectedTag}>{name}</span>
                        ))}
                      </div>
                    )}
                  </div>

                  <button 
                    onClick={handleStartQuestions}
                    disabled={selectedSoldiers.length < 2}
                    style={{
                      ...styles.buttonPrimary,
                      ...(selectedSoldiers.length < 2 ? styles.buttonDisabled : {})
                    }}
                  >
                    ДАЛІ → ПИТАННЯ ({selectedSoldiers.length}/2)
                  </button>
                </div>
              </div>
            );
          }

          if (gameState === 'questions') {
            const question = questions[currentQuestion];
            
            return (
              <div style={styles.container}>
                <div style={styles.header}>
                  <h1 style={styles.title}>ПИТАННЯ {currentQuestion + 1}/4</h1>
                  <p style={styles.subtitle}>Артур, хто ти насправді?</p>
                </div>

                <div style={styles.card}>
                  <div style={styles.questionText}>{question.question}</div>
                  
                  <div style={styles.answersContainer}>
                    {question.answers.map((answer, idx) => (
                      <button
                        key={idx}
                        onClick={() => handleAnswerQuestion(answer.value)}
                        style={styles.answerButton}
                        onMouseOver={(e) => {
                          e.target.style.background = '#444';
                          e.target.style.borderColor = '#d4a574';
                        }}
                        onMouseOut={(e) => {
                          e.target.style.background = '#333';
                          e.target.style.borderColor = '#555';
                        }}
                      >
                        {answer.text}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={styles.progressBar}>
                  <div style={{...styles.progressFill, width: `${((currentQuestion + 1) / questions.length) * 100}%`}}></div>
                </div>
              </div>
            );
          }

          if (gameState === 'analysis' && psychology) {
            return (
              <div style={styles.container}>
                <div style={styles.header}>
                  <h1 style={styles.title}>ТВІЙ ПСИХОЛОГІЧНИЙ ПОРТРЕТ</h1>
                  <p style={styles.subtitle}>2005 рік - що ти собою являєш</p>
                </div>

                <div style={styles.card}>
                  <div style={styles.traitsBox}>
                    <div style={styles.traitsTitle}>Твої якості:</div>
                    {psychology.traits.map((trait, idx) => (
                      <span key={idx} style={styles.traitTag}>{trait}</span>
                    ))}
                  </div>

                  <div style={styles.recommendationBox}>
                    <div style={styles.recommendationTitle}>💭 Аналіз:</div>
                    <p style={styles.recommendationText}>{psychology.recommendation}</p>
                  </div>

                  {psychology.motivation && (
                    <div style={styles.motivationBox}>
                      <div style={styles.motivationTitle}>🎯 Твоя мотивація:</div>
                      <p style={styles.motivationText}>{psychology.motivation}</p>
                    </div>
                  )}

                  <div style={styles.canLeavebox}>
                    {psychology.canLeave ? (
                      <p style={{color: '#d4a574', fontSize: '16px', fontWeight: 'bold'}}>
                        ⚠️ Артур, ти вже розумієш, що хочеш ВИЙТИ. Але це займе ще 12 років...
                      </p>
                    ) : (
                      <p style={{color: '#888', fontSize: '16px'}}>
                        Ти все ще не впевнений. Служба дає тобі щось важливе.
                      </p>
                    )}
                  </div>
                </div>

                <button 
                  onClick={() => {
                    setProgress({ ...progress, level: 2 });
                    setGameState('intro');
                    setSelectedSoldiers([]);
                    setAnswers({});
                    setCurrentQuestion(0);
                  }}
                  style={styles.buttonPrimary}
                >
                  ДАЛІ → РІВЕНЬ 2 (2009) - КІМНАТКА НА КОСУСЕ
                </button>

                <div style={styles.progressBar}>
                  <div style={{...styles.progressFill, width: '33%'}}></div>
                </div>
                <div style={styles.levelText}>РІВЕНЬ 1/3 ЗАВЕРШЕНО ✓</div>
              </div>
            );
          }

          return <div>Loading...</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ArmyGame />);
    </script>
</body>
</html>
